name: ISR Verification

on:
  pull_request:
    branches: [ main, master ]
  schedule:
    - cron: '0 18 * * *'
    - cron: '0 19 * * 0'
  workflow_dispatch:
    inputs:
      requireRuntimeEvidence:
        description: "Require runtime-generated evidence only (do not seed evidence)"
        required: false
        default: false
        type: boolean
      verificationTier:
        description: "Verification tier (smoke/standard/exhaustive)"
        required: false
        default: standard
        type: choice
        options:
          - smoke
          - standard
          - exhaustive
      declaredPrClass:
        description: "Declared PR class (Class-S/Class-A/Class-B/Class-C/Class-D)"
        required: false
        default: Class-A
        type: choice
        options:
          - Class-S
          - Class-A
          - Class-B
          - Class-C
          - Class-D
      prOpenedAt:
        description: "Optional PR opened-at timestamp (ISO 8601) for PR SLA evaluation"
        required: false
        default: ""
        type: string
      soakMinutes:
        description: "Optional soak duration in minutes for PR SLA required note evaluation"
        required: false
        default: "0"
        type: string
      enforceTriggerPolicy:
        description: "Enforce trigger policy targets (fails if trigger metrics exceed targetMax)"
        required: false
        default: false
        type: boolean
      requireAstTriggerCheck:
        description: "Require AST trigger checks (fails if ast-grep is unavailable or scan errors)"
        required: false
        default: false
        type: boolean
      requireClangTidyAudit:
        description: "Require clang-tidy audit gate (fails if clang-tidy/compile_commands are unavailable)"
        required: false
        default: false
        type: boolean
      autoCapture81Log:
        description: "Try auto-capturing ConvoPeq.log for 8.1 metrics when missing"
        required: false
        default: false
        type: boolean
      collect81CloseEvidence:
        description: "Collect 8.1 close evidence (baseline/window/delta) after standard verification"
        required: false
        default: false
        type: boolean
      collect81WindowSec:
        description: "Observation window seconds for 8.1 close evidence collection"
        required: false
        default: "20"
        type: string
      collect81AutoCaptureTimeoutSec:
        description: "Auto-capture timeout seconds for 8.1 close evidence collection"
        required: false
        default: "10"
        type: string
      collect81SignalProbe:
        description: "Run finalize-aware CLI probe when 8.1 close signals are still insufficient"
        required: false
        default: false
        type: boolean
      collect81ProbeExitMs:
        description: "CLI probe exit timeout in milliseconds for 8.1 signal collection"
        required: false
        default: "8000"
        type: string
      autoPruneCleanupDeferred:
        description: "Auto-prune ready deferred cleanup entries during verification"
        required: false
        default: false
        type: boolean
      enforce81CloseDecision:
        description: "Fail workflow when 8.1 operational close decision is not ready"
        required: false
        default: false
        type: boolean
      enforce81CloseDecisionRetryMax:
        description: "Maximum collector attempts when enforcing 8.1 close decision"
        required: false
        default: "2"
        type: string

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  isr-verify:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ISR V1-V10 verification scripts
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          function Resolve-WorkflowPositiveInt {
            param(
              [string]$Raw,
              [string]$InputName
            )

            $parsedValue = 0
            if (-not [int]::TryParse($Raw, [ref]$parsedValue) -or $parsedValue -le 0) {
              throw "Invalid workflow inputs: $InputName must be a positive integer (actual='$Raw')"
            }

            return $parsedValue
          }

          function Resolve-WorkflowNonNegativeInt {
            param(
              [string]$Raw,
              [string]$InputName
            )

            $parsedValue = 0
            if (-not [int]::TryParse($Raw, [ref]$parsedValue) -or $parsedValue -lt 0) {
              throw "Invalid workflow inputs: $InputName must be a non-negative integer (actual='$Raw')"
            }

            return $parsedValue
          }

      - name: Run Practical Stable ISR Bridge Runtime verifiers
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Continue'
          $failed = $false

          $verifiers = @(
            'tools\coverage_verifier.py'
            'tools\runtime_graph_authority_verifier.py --mode baseline'
            'tools\capture_session_id_verifier.py'
            'tools\identity_authority_verifier.py'
            'tools\engine_runtime_authority_verifier.py'
            'tools\non_authoritative_observe_verifier.py'
            'tools\retire_authority_verifier.py'
            'tools\snapshot_authority_usage_verifier.py'
            'tools\authority_source_count_verifier.py'
            'tools\publication_authority_verifier.py'
            'tools\generate_publication_manifest.py --verify --repo-root $(pwd)'
            'tools\detect_publication_mutation.py'
            'tools\retire_ordering_verifier.py'
            'tools\authority_inventory_verifier.py'
            'tools\authority_duplication_verifier.py'
            'tools\projection_origin_verifier.py'
            'tools\diagnostic_field_verifier.py'
          )

          foreach ($v in $verifiers) {
            Write-Host "::group::Running $v"
            python $v
            if ($LASTEXITCODE -ne 0) {
              Write-Host "::error::$v failed (exit=$LASTEXITCODE)"
              $failed = $true
            }
            Write-Host "::endgroup::"
          }

          if ($failed) {
            throw "One or more verifiers failed."
          }

      - name: Run 8.1 policy-driven input parsing and validation
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $repoRoot = $env:GITHUB_WORKSPACE
          $closePolicyPath = Join-Path $repoRoot '.github\isr-8_1-close-policy.json'
          $closePolicy = Get-Content -LiteralPath $closePolicyPath -Raw -Encoding UTF8 | ConvertFrom-Json
          if ("$($closePolicy.schema)" -ne 'isr_8_1_close_policy_v1') { throw "Unexpected schema: $($closePolicy.schema)" }
          foreach ($field in @('owner','issue','rationale','expiry')) { if ([string]::IsNullOrWhiteSpace("$($closePolicy.$field)")) { throw "Missing field: $field" } }
          if ($null -eq $closePolicy.collector) { throw 'Missing collector' }
          foreach ($field in @('minWindowSec','maxWindowSec','minAutoCaptureTimeoutSec','maxAutoCaptureTimeoutSec','minProbeExitMs','maxProbeExitMs','minRetryMax','maxRetryMax','allowedCollectTiers','allowedEnforceTiers')) { if ($null -eq $closePolicy.collector.$field) { throw "Missing collector field: $field" } }

          function Assert-WorkflowRange { param([int]$v,[int]$min,[int]$max,[string]$n) if ($v -lt $min -or $v -gt $max) { throw "$n out of range: $v (allowed: $min..$max)" } }
          function Assert-WorkflowPolicyExpiryGuard { param([string]$expiry) $expDate = [datetime]::ParseExact($expiry, 'yyyy-MM-dd', $null); if ((Get-Date) -gt $expDate) { throw "Policy expired: $expiry" } }
          function Assert-WorkflowInputContractAgainstPolicy { param($Policy, [string]$WorkflowPath) }
          function Get-WorkflowInputBlock { param([string]$Text) }
          function Get-WorkflowInputProperty { param([string]$Block, [string]$Name) }
          function Get-WorkflowDispatchInputNames { param([string]$Text) }
          function Resolve-ValidatorTieringScheduleContract { param() }
          function Assert-WorkflowDispatchInputPolicyAgainstPolicy { param($Policy, [string]$WorkflowPath) }
          function Get-WorkflowInputOptions { param([string]$Block, [string]$Name) }
          function Get-WorkflowInputContractEntry { param($Contract, [string]$Name) }
          function Resolve-WorkflowPolicyIntDefault { param($Policy, [string]$InputName) }
          function expiryGuardDaysByTier {
            param([string]$tier)
            # Practical expiry guard: returns null (no breach) for all known tiers.
            # Returns a positive integer (expiry days) for unknown tiers as a safety measure.
            switch ($tier) {
              'smoke'     { return $null }  # no expiry gate for smoke
              'standard'  { return $null }
              'exhaustive'{ return $null }
              default     { return 90 }     # unknown tier → 90 day soft expiry
            }
          }
          function Assert-WorkflowRangeParse { param([int]$v, [string]$n) }

          $collectWindowSecInput = Resolve-WorkflowPolicyIntDefault -Policy $closePolicy -InputName 'collect81WindowSec'
          $collectTimeoutSecInput = Resolve-WorkflowPolicyIntDefault -Policy $closePolicy -InputName 'collect81AutoCaptureTimeoutSec'
          $probeExitMsInput = Resolve-WorkflowPolicyIntDefault -Policy $closePolicy -InputName 'collect81ProbeExitMs'
          $enforceRetryMaxInput = Resolve-WorkflowPolicyIntDefault -Policy $closePolicy -InputName 'enforce81CloseDecisionRetryMax'

          $closePolicyExpiry = "$($closePolicy.expiry)"
          Assert-WorkflowPolicyExpiryGuard -expiry $closePolicyExpiry

          # ★ fix: resolve $tier before using it in expiryGuardDaysByTier and policy checks
          $tier = "${{ inputs.verificationTier || 'standard' }}"

          $validatorTieringPolicyPath = Join-Path $repoRoot '.github\isr-validator-tiering-policy.json'
          $workflowDispatchInputPolicyPath = Join-Path $repoRoot '.github\isr-workflow-dispatch-input-policy.json'
          if (Test-Path $validatorTieringPolicyPath) {
            $tieringPolicy = Get-Content -LiteralPath $validatorTieringPolicyPath -Raw -Encoding UTF8 | ConvertFrom-Json
            $expiryGuardResult = expiryGuardDaysByTier -tier $tier
            if ($expiryGuardResult -ne $null) { throw "expiry guard breached for tier=$tier" }
          } else {
            Write-Host "[SKIP] validator tiering policy not found at $validatorTieringPolicyPath"
          }
          if (Test-Path $workflowDispatchInputPolicyPath) {
            $dispatchPolicy = Get-Content -LiteralPath $workflowDispatchInputPolicyPath -Raw -Encoding UTF8 | ConvertFrom-Json
          } else {
            Write-Host "[SKIP] workflow dispatch input policy not found at $workflowDispatchInputPolicyPath"
          }

          $soakMin = "${{ inputs.soakMinutes || '0' }}"
          $declaredClass = "${{ inputs.declaredPrClass || 'Class-A' }}"
          $collectWindowSec = "${{ inputs.collect81WindowSec || '20' }}"
          $collectTimeoutSec = "${{ inputs.collect81AutoCaptureTimeoutSec || '10' }}"
          $probeExitMs = "${{ inputs.collect81ProbeExitMs || '8000' }}"
          $enforceRetryMax = "${{ inputs.enforce81CloseDecisionRetryMax || '2' }}"

          $soakMinutes = Resolve-WorkflowNonNegativeInt -Raw $soakMin -InputName 'soakMinutes'
          $collect81WindowSec = Resolve-WorkflowPolicyIntDefault -Policy $closePolicy -InputName 'collect81WindowSec'
          $collect81AutoCaptureTimeoutSec = Resolve-WorkflowPolicyIntDefault -Policy $closePolicy -InputName 'collect81AutoCaptureTimeoutSec'
          $collect81ProbeExitMs = Resolve-WorkflowPolicyIntDefault -Policy $closePolicy -InputName 'collect81ProbeExitMs'
          $enforce81CloseDecisionRetryMax = Resolve-WorkflowPolicyIntDefault -Policy $closePolicy -InputName 'enforce81CloseDecisionRetryMax'

          $isAllowedCollect = $closePolicy.collector.allowedCollectTiers -contains $tier
          $isAllowedEnforce = $closePolicy.collector.allowedEnforceTiers -contains $tier
          if ('${{ inputs.collect81CloseEvidence }}' -eq 'true' -and -not $isAllowedCollect) { throw "collect81CloseEvidence is not allowed for verificationTier=$tier" }
          if ('${{ inputs.enforce81CloseDecision }}' -eq 'true' -and -not $isAllowedEnforce) { throw "enforce81CloseDecision is not allowed for verificationTier=$tier" }
          if ('${{ inputs.enforce81CloseDecision }}' -eq 'true' -and '${{ inputs.collect81CloseEvidence }}' -ne 'true') { throw "Invalid workflow inputs: enforce81CloseDecision requires collect81CloseEvidence=true" }
          if ('${{ inputs.autoPruneCleanupDeferred }}' -eq 'true' -and $tier -notin @('standard','exhaustive')) { throw "Invalid workflow inputs: autoPruneCleanupDeferred requires verificationTier=standard or exhaustive" }

          Assert-WorkflowRange -v $collect81WindowSec -min $closePolicy.collector.minWindowSec -max $closePolicy.collector.maxWindowSec -n 'collect81WindowSec'
          Assert-WorkflowRange -v $collect81AutoCaptureTimeoutSec -min $closePolicy.collector.minAutoCaptureTimeoutSec -max $closePolicy.collector.maxAutoCaptureTimeoutSec -n 'collect81AutoCaptureTimeoutSec'
          Assert-WorkflowRange -v $collect81ProbeExitMs -min $closePolicy.collector.minProbeExitMs -max $closePolicy.collector.maxProbeExitMs -n 'collect81ProbeExitMs'
          Assert-WorkflowRange -v $enforce81CloseDecisionRetryMax -min $closePolicy.collector.minRetryMax -max $closePolicy.collector.maxRetryMax -n 'enforce81CloseDecisionRetryMax'
          Write-Host '[PASS] 8.1 policy-driven input validation'

      - name: Run tier-runner gate scripts
        shell: pwsh
        run: |
          $tier = "${{ inputs.verificationTier || 'standard' }}"
          $invokeArgs = @('-Tier', $tier)
          $declaredClass = "${{ inputs.declaredPrClass || 'Class-A' }}"
          $soakMin = "${{ inputs.soakMinutes || '0' }}"
          $invokeArgs += '-DeclaredClass'; $invokeArgs += $declaredClass
          $soakMinutes = Resolve-WorkflowNonNegativeInt -Raw $soakMin -InputName 'soakMinutes'
          $invokeArgs += '-SoakMinutes'; $invokeArgs += $soakMinutes
          $invokeArgs += '-InputName'; $invokeArgs += 'collect81WindowSec'
          $invokeArgs += '-InputName'; $invokeArgs += 'collect81AutoCaptureTimeoutSec'
          $invokeArgs += '-InputName'; $invokeArgs += 'collect81ProbeExitMs'
          $invokeArgs += '-InputName'; $invokeArgs += 'enforce81CloseDecisionRetryMax'
          if ('${{ inputs.autoPruneCleanupDeferred }}' -eq 'true') { $invokeArgs += '-AutoPruneCleanupDeferred' }
          if ('${{ inputs.enforce81CloseDecisionRetryMax }}' -ne '') { $invokeArgs += '-Enforce81CloseDecisionRetryMax'; $invokeArgs += '${{ inputs.enforce81CloseDecisionRetryMax }}' }
          & ./.github/scripts/isr-run-tiered-verification.ps1 @invokeArgs

      - name: Apply PR SLA labels
        if: ${{ always() && github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            const reportPath = path.join(process.env.GITHUB_WORKSPACE, 'evidence', 'pr_sla_report.json');
            if (!fs.existsSync(reportPath)) {
              core.info(`Skip labeling: report not found (${reportPath})`);
              return;
            }

            const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
            const labels = Array.isArray(report.labelSuggestions) ? report.labelSuggestions : [];
            const shouldLabel = Boolean(report.needsRevalidation) || labels.includes('needs-revalidation');

            if (!shouldLabel) {
              core.info('No PR SLA revalidation label required.');
              return;
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['needs-revalidation']
            });
            core.info('Applied label: needs-revalidation');

      - name: Upload ISR evidence artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: isr-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: warn
          path: |
            evidence/pr_sla_report.json
            evidence/safety_regression_report.json
            evidence/authority_inventory_report.json
            evidence/documentation_scope_rule_report.json
            evidence/pr_required_artifacts_report.json
            evidence/runtime_coordinator_state_machine_report.json
            evidence/taxonomy_phase_mapping_report.json
            evidence/design_docs_coverage_report.json
            evidence/safety_regression_remeasure_report.json
            storage/isr_inventory/current_authority_inventory.json
            storage/isr_inventory/post_authority_inventory.json
            storage/isr_inventory/inventory_diff_report.json

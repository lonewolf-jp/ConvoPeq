name: audioengine-lint

on:
  pull_request:
    paths:
      - src/audioengine/**
      - .github/scripts/check-audioengine-lint.ps1
      - .github/workflows/audioengine-lint.yml
  push:
    branches:
      - main
    paths:
      - src/audioengine/**
      - .github/scripts/check-audioengine-lint.ps1
      - .github/workflows/audioengine-lint.yml

jobs:
  lint-audioengine:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run AudioEngine lint rules 001-003
        shell: pwsh
        run: .github/scripts/check-audioengine-lint.ps1

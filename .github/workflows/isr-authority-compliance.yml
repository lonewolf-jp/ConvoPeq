name: ISR Authority Compliance v6.4

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ============================================================
  # 静的ガバナンス検査
  # ============================================================
  authority-static-checks:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # P1 Phase1-B: エラー（PublicationIntent 系レガシー構造体・関数の完全削除確認）
      - name: Check legacy PublicationIntent remnants removed (P1 Phase1-B)
        shell: pwsh
        run: |
          $errors = @()
          if (Select-String -Path src\**\* -Pattern "struct PublicationIntent|struct PublicationLog" -Quiet) {
            $errors += "PublicationIntent/PublicationLog struct still exists"
          }
          if (Select-String -Path src\**\* -Pattern "\bappendPublicationIntentForCommit\s*\(|\bdrainPublicationLogForShutdown\s*\(|\bhasPublicationLogPending\s*\(" -Quiet) {
            $errors += "Legacy PublicationLog functions still exist"
          }
          if ($errors.Count -gt 0) {
            foreach ($e in $errors) {
              Write-Host "::error::$e"
            }
            exit 1
          }
          Write-Host "Phase1-B: All PublicationIntent/PublicationLog remnants removed."

      # P14: 部分公開禁止（grep 補助、確認）
      - name: Check partial publication interfaces (P14)
        shell: pwsh
        run: |
          $found = $false
          if (Select-String -Path src\**\* -Pattern "publish\(generation|publish\(dsp" -Quiet) {
            Write-Host "::error::partial publication interface detected (publish(generation) or publish(dsp))"
            $found = $true
            exit 1
          }
          if (-not $found) {
            Write-Host "No partial publication interfaces detected."
          }

      # P3: 新規コードのみエラー（EpochDomain::enqueueRetire 直接呼び出し）
      - name: Static AuthorityViolation - Direct EpochRetire (new code only)
        shell: pwsh
        run: |
          $diff = git diff origin/${{ github.base_ref || 'main' }}...HEAD -- src/ 2>$null
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::warning::Cannot compare with base branch - check skipped"
            exit 0
          }
          $violations = $diff | Select-String -Pattern "^\+\s*.*EpochDomain.*enqueueRetire" | Where-Object { $_ -notmatch "Coordinator" }
          if ($violations) {
            Write-Host "::error::New code uses direct enqueueRetire (must use Coordinator::enqueueRetire instead)"
            $violations | ForEach-Object { Write-Host "  $_" }
            exit 1
          }
          Write-Host "No direct EpochDomain::enqueueRetire in new code."

  # ============================================================
  # 動的テスト
  # ============================================================
  authority-runtime-tests:
    runs-on: windows-latest
    if: always()
    needs: authority-static-checks
    steps:
      - uses: actions/checkout@v4

      # MSVC コンパイラ（cl.exe）の環境変数をセットアップ
      - name: Set up MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # Ninja をインストール
      - name: Set up Ninja
        uses: ashutoshvarma/setup-ninja@v1.1

      # Intel oneAPI MKL をインストール（find_package(MKL) に必要）
      # Practical Stable ISR: download failure is non-fatal → falls back to CMake config
      - name: Install Intel oneAPI MKL
        shell: pwsh
        continue-on-error: true  # ★ Practical Stable: MKL download/install failure should not block CI
        run: |
          $mklCfg = "C:\Program Files (x86)\Intel\oneAPI\mkl\latest\lib\cmake\mkl\MKLConfig.cmake"
          if (Test-Path $mklCfg) { Write-Host "MKL already installed."; exit 0 }

          # 1. Check connectivity before large download
          try {
            $testUrl = "https://registrationcenter-download.intel.com"
            $request = [System.Net.WebRequest]::Create($testUrl)
            $request.Timeout = 5000
            $request.Method = "HEAD"
            $response = $request.GetResponse()
            $response.Close()
          } catch {
            Write-Host "::warning::Cannot reach Intel download server (${_}). MKL-dependent features will be unavailable."
            exit 0
          }

          # 2. Download (with timeout guard against stalled downloads)
          $exe = "$env:TEMP\oneapi-toolkit.exe"
          if (-not (Test-Path $exe)) {
            Write-Host "Downloading Intel oneAPI toolkit (~3.5 GB)..."
            try {
              $webClient = New-Object System.Net.WebClient
              $downloadTask = $webClient.DownloadFileTaskAsync(
                "https://registrationcenter-download.intel.com/akdlm/IRC_NAS/bae85ab1-cfcd-4251-8d42-a0c27949ea33/intel-oneapi-toolkit-2026.0.0.193_offline.exe",
                $exe
              )
              $timeoutSec = 300  # 5 min max wait
              if (-not $downloadTask.Wait(($timeoutSec * 1000))) {
                $webClient.CancelAsync()
                throw "Download timed out after ${timeoutSec}s"
              }
              if ($downloadTask.Exception) { throw $downloadTask.Exception.InnerException }
            } catch {
              Write-Host "::warning::MKL download failed (${_}). MKL-dependent features will be unavailable."
              exit 0
            }
          } else { Write-Host "Using cached installer." }

          # 3. Extract (cached)
          $extDir = "$env:TEMP\oneapi_extracted"
          if (-not (Test-Path "$extDir\bootstrapper.exe")) {
            Write-Host "Extracting installer..."
            $proc = Start-Process -Wait -PassThru -FilePath $exe -ArgumentList "-s -x -f $extDir --log $env:TEMP\extract.log"
            if ($proc.ExitCode -ne 0) {
              Write-Host "::warning::MKL extraction failed (exit=$($proc.ExitCode)). MKL-dependent features will be unavailable."
              exit 0
            }
          }
          # 3. Install MKL
          Write-Host "Installing MKL..."
          Start-Process -Wait -FilePath "$extDir\bootstrapper.exe" -ArgumentList "--silent --action install --components=intel.oneapi.win.mkl.devel --eula=accept -p=NEED_VS2017_INTEGRATION=0 -p=NEED_VS2019_INTEGRATION=0 -p=NEED_VS2022_INTEGRATION=0 --log-dir=$env:TEMP"
          # 4. Cleanup
          Remove-Item -Recurse -Force $extDir -ErrorAction SilentlyContinue
          if (Test-Path $mklCfg) { Write-Host "MKL installed successfully." }
          else { Write-Host "::warning::MKLConfig.cmake not found after install" }

      - name: Configure CMake
        shell: pwsh
        run: |
          # Intel oneAPI 環境変数を設定（setvars.bat 相当）
          $oneapiRoot = "C:\Program Files (x86)\Intel\oneAPI"
          if (Test-Path "$oneapiRoot\setvars.bat") {
            cmd /c """$oneapiRoot\setvars.bat"" && set" | ForEach-Object {
              if ($_ -match "^(.*?)=(.*)$") {
                Set-Item -Path "env:$($matches[1])" -Value $matches[2]
              }
            }
          }
          # CMake の検索パスに oneAPI を追加
          $env:CMAKE_PREFIX_PATH = "$oneapiRoot;$oneapiRoot\mkl\latest\lib\cmake\mkl;$oneapiRoot\ipp\latest\lib\cmake\ipp"
          cmake -S . -B build -G "Ninja Multi-Config" `
            -DCMAKE_C_COMPILER=cl -DCMAKE_CXX_COMPILER=cl `
            -DCONVO_CI_BUILD=ON

      - name: Build ISR tests
        shell: pwsh
        run: |
          cmake --build build --config Debug --target ISRSemanticValidationTests
          cmake --build build --config Debug --target PartialPublicationRejectTests

      - name: Run fail-closed governance tests (P20)
        shell: pwsh
        run: |
          $failed = $false

          # P4 + P20 tests
          & .\build\Debug\ISRSemanticValidationTests.exe
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::ISRSemanticValidationTests failed (exit=$LASTEXITCODE)"
            $failed = $true
          }

          # PartialPublicationReject tests
          & .\build\Debug\PartialPublicationRejectTests.exe
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::PartialPublicationRejectTests failed (exit=$LASTEXITCODE)"
            $failed = $true
          }

          if ($failed) {
            throw "One or more governance tests failed."
          }
          Write-Host "All governance tests passed."

  # ============================================================
  # 監査レポート検証
  # ============================================================
  audit-report-verification:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify audit reports (P11, P12, P14, P15)
        shell: pwsh
        run: |
          $failed = $false
          $reports = @("p11_audit.md", "p12_audit.md", "p14_audit.md", "p15_audit.md")
          $requiredFields = @("AUDIT_RESULT", "AUDIT_DATE", "AUDITOR", "CHECKED_SYMBOLS", "FINDINGS", "SEARCH_COMMANDS")

          foreach ($report in $reports) {
            $path = ".github/audit/$report"
            if (-not (Test-Path $path)) {
              Write-Host "::error::$report not found"
              $failed = $true
              continue
            }

            $content = Get-Content $path -Raw

            # 必須フィールドの存在確認
            foreach ($field in $requiredFields) {
              if ($content -notmatch "${field}:") {
                Write-Host "::error::$report missing $field"
                $failed = $true
              }
            }

            # CHECKED_SYMBOLS が空でないこと
            if ($content -match "CHECKED_SYMBOLS:\s*$") {
              Write-Host "::error::$report CHECKED_SYMBOLS is empty"
              $failed = $true
            }

            # SEARCH_COMMANDS が空でないこと
            if ($content -match "SEARCH_COMMANDS:\s*$") {
              Write-Host "::error::$report SEARCH_COMMANDS is empty"
              $failed = $true
            }

            # AUDIT_RESULT が PASS であること
            if ($content -notmatch "AUDIT_RESULT: PASS") {
              Write-Host "::error::$report AUDIT_RESULT is not PASS"
              $failed = $true
            }

            Write-Host "$report audit fields verified."
          }

          if ($failed) {
            throw "One or more audit reports failed verification."
          }
          Write-Host "All audit reports passed verification."

      - name: Verify P15 tool outputs (non-empty)
        shell: pwsh
        run: |
          $failed = $false
          $outputs = @("p15_serena.txt", "p15_codegraph.txt")
          foreach ($output in $outputs) {
            $path = ".github/audit/$output"
            if (-not (Test-Path $path)) {
              Write-Host "::error::$output not found"
              $failed = $true
              continue
            }
            $item = Get-Item $path
            if ($item.Length -eq 0) {
              Write-Host "::error::$output is empty"
              $failed = $true
            } else {
              Write-Host "$output size: $($item.Length) bytes"
            }
          }
          if ($failed) {
            throw "P15 tool outputs verification failed."
          }
          Write-Host "All P15 tool outputs verified."

      - name: Verify P1 Phase1-B audit (optional)
        shell: pwsh
        run: |
          $path = ".github/audit/p1_phase1b_audit.md"
          if (Test-Path $path) {
            $content = Get-Content $path -Raw
            if ($content -notmatch "AUDIT_RESULT: PASS") {
              Write-Host "::warning::P1 Phase1-B audit result is not PASS"
            } else {
              Write-Host "P1 Phase1-B audit verified."
            }
          } else {
            Write-Host "P1 Phase1-B audit not yet created (Phase1-B not started)."
          }
